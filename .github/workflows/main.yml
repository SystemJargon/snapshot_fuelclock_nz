name: Daily Fuel Screenshot

on:
  schedule:
    - cron: '0 5 * * *'  # 5:00 AM UTC = 5:00 PM NZST (or 6:00 PM NZDT)
  workflow_dispatch:      # Still keep this so you can trigger it manually

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Allows the bot to save the image back to the repo
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run screenshot script
        run: python screenshot.py

      - name: Commit and push screenshot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/*.png
          git commit -m "Add daily screenshot: $(date)"
          git push
